apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bia-ingress
  annotations:
    alb.ingress.kubernetes.io/group.name: bia-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: instance
    alb.ingress.kubernetes.io/subnets: subnet-04403cfe612606b62,subnet-0dc7acf8cd5881d33
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-2016-08
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:976808777516:certificate/a5368b26-d5e7-4606-93bb-b7d764c5575c
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
spec:
  ingressClassName: alb
  rules:
  - host: bia-eks.alisriosti.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bia
            port:
              number: 8080